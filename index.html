<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagramador de Figuras Pro</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Cargamos Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- PARCHE VITAL: Obligamos a Babel a usar el motor clásico de React para evitar errores de importación local -->
  <script>
    Babel.registerPreset('react-classic', {
      presets: [
        [Babel.availablePresets['react'], { runtime: 'classic' }]
      ]
    });
  </script>

  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    
    /* Placeholder inteligente para figuras vacías */
    [contenteditable]:empty:before {
      content: "Escribe aquí...";
      color: #94a3b8;
      font-weight: 400;
      font-style: italic;
    }
    
    /* Suavizado fino de tipografía */
    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Estilos para ocultar la interfaz al imprimir */
    @media print {
      body { background: white !important; }
      .no-print { display: none !important; }
      /* Permite imprimir en horizontal para abarcar más diagrama */
      @page { size: landscape; }
    }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <!-- Le indicamos al script que use nuestro motor clásico recién creado -->
  <script type="text/babel" data-presets="react-classic">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // --- ICONOS VECTORIALES (SVG en línea para máxima velocidad) ---
    const ChevronUp = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"/></svg>;
    const ChevronDown = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>;
    const ChevronLeft = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
    const ChevronRight = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
    const Square = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>;
    const PlusSquare = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>;
    const Circle = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/></svg>;
    const Pentagon = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 22 8.5 18.2 22 5.8 22 2 8.5"/></svg>;
    const Diamond = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 22 12 12 22 2 12"/></svg>;
    const Palette = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.55-2.503 5.55-5.554C21.965 6.012 17.461 2 12 2z"/></svg>;
    const Plus = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const Minus = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/></svg>;
    const MousePointer2 = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m4 4 7.07 17 2.51-7.39L21 11.07z"/></svg>;
    const Hand = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg>;
    const Save = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/></svg>;
    const FolderOpen = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2"/></svg>;
    const Printer = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
    const Trash2 = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const FilePlus = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M9 15h6"/><path d="M12 18v-6"/></svg>;
    const MessageSquare = ({size=24, fill="none"}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
    const LinkIcon = ({size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;

    // --- GENERADOR DE IDs ---
    const generateId = () => Math.random().toString(36).substring(2, 9);

    // --- MAPA DE PALETAS DE COLOR PREMIUM ---
    const COLOR_MAP = {
      '#ffffff': { bg: '#ffffff', border: '#cbd5e1', text: '#1e293b' },
      '#fef08a': { bg: '#fef08a', border: '#f59e0b', text: '#78350f' },
      '#bbf7d0': { bg: '#bbf7d0', border: '#10b981', text: '#065f46' },
      '#bfdbfe': { bg: '#bfdbfe', border: '#3b82f6', text: '#1e3a8a' },
      '#fbcfe8': { bg: '#fbcfe8', border: '#ec4899', text: '#9d174d' },
      '#fed7aa': { bg: '#fed7aa', border: '#f97316', text: '#7c2d12' },
      '#e2e8f0': { bg: '#e2e8f0', border: '#94a3b8', text: '#334155' }
    };
    const COLORS = Object.keys(COLOR_MAP);

    const NODE_WIDTH = 150;
    const NODE_HEIGHT = 100;

    // ============================================================================
    // MOTOR DE AUTOLAYOUT (BOUNDING BOX HIERÁRQUICO Y REDIMENSIONABLE)
    // ============================================================================
    const applyLocalLayout = (parentId, currentNodes, currentEdges) => {
      const parent = currentNodes.find(n => n.id === parentId);
      if (!parent) return currentNodes;

      const childEdges = currentEdges.filter(e => e.source === parentId);
      const childIds = childEdges.map(e => e.target);
      const children = currentNodes.filter(n => childIds.includes(n.id));

      const groups = { right: [], left: [], top: [], bottom: [] };
      
      children.forEach(c => {
        const edge = childEdges.find(e => e.target === c.id);
        let dir = edge.direction;
        
        if (!dir) {
          const dx = c.x - parent.x;
          const dy = c.y - parent.y;
          if (Math.abs(dx) >= Math.abs(dy)) {
            dir = dx >= 0 ? 'right' : 'left';
          } else {
            dir = dy >= 0 ? 'bottom' : 'top';
          }
        }
        
        if (groups[dir]) groups[dir].push(c);
      });

      let updatedNodes = [...currentNodes];

      const getSubtree = (rootId) => {
        const desc = new Set([rootId]);
        const queue = [rootId];
        while(queue.length > 0) {
          const curr = queue.shift();
          currentEdges.forEach(e => {
            if (e.source === curr && !desc.has(e.target)) {
              desc.add(e.target);
              queue.push(e.target);
            }
          });
        }
        
        let minY = Infinity, maxY = -Infinity, minX = Infinity, maxX = -Infinity;
        updatedNodes.forEach(n => {
          if (desc.has(n.id)) {
            minY = Math.min(minY, n.y);
            maxY = Math.max(maxY, n.y + (n.height || NODE_HEIGHT));
            minX = Math.min(minX, n.x);
            maxX = Math.max(maxX, n.x + (n.width || NODE_WIDTH));
          }
        });
        
        return { desc, height: maxY - minY, width: maxX - minX, minY, maxY, minX, maxX };
      };

      const GAP_Y = 30; // Margen de seguridad vertical entre ramas
      const GAP_X = 40; // Margen de seguridad horizontal entre ramas

      // Recalcular ramas que crecen en horizontal
      ['right', 'left'].forEach(side => {
        const group = groups[side];
        if (group.length === 0) return;
        
        group.sort((a, b) => a.y - b.y); 
        
        const infos = group.map(c => {
          const st = getSubtree(c.id);
          return { node: c, st, topSpan: c.y - st.minY, bottomSpan: st.maxY - c.y };
        });
        
        const totalHeight = infos.reduce((sum, info) => sum + info.st.height, 0) + GAP_Y * (group.length - 1);
        let currentY = parent.y + (parent.height || NODE_HEIGHT) / 2 - totalHeight / 2;

        infos.forEach(info => {
          const targetY = currentY + info.topSpan;
          const dy = targetY - info.node.y;
          
          if (dy !== 0) {
            updatedNodes = updatedNodes.map(n => {
              if (info.st.desc.has(n.id)) return { ...n, y: n.y + dy };
              return n;
            });
            info.node.y += dy;
          }
          currentY += info.st.height + GAP_Y;
        });
      });

      // Recalcular ramas que crecen en vertical
      ['top', 'bottom'].forEach(side => {
        const group = groups[side];
        if (group.length === 0) return;
        
        group.sort((a, b) => a.x - b.x); 
        
        const infos = group.map(c => {
          const st = getSubtree(c.id);
          return { node: c, st, leftSpan: c.x - st.minX, rightSpan: st.maxX - c.x };
        });
        
        const totalWidth = infos.reduce((sum, info) => sum + info.st.width, 0) + GAP_X * (group.length - 1);
        let currentX = parent.x + (parent.width || NODE_WIDTH) / 2 - totalWidth / 2;

        infos.forEach(info => {
          const targetX = currentX + info.leftSpan;
          const dx = targetX - info.node.x;
          
          if (dx !== 0) {
            updatedNodes = updatedNodes.map(n => {
              if (info.st.desc.has(n.id)) return { ...n, x: n.x + dx };
              return n;
            });
            info.node.x += dx;
          }
          currentX += info.st.width + GAP_X;
        });
      });

      return updatedNodes;
    };

    const updateTreeLayout = (startNodeId, currentNodes, currentEdges) => {
        let updatedNodes = [...currentNodes];
        let curr = startNodeId;
        
        const getParent = (id) => {
            const edge = currentEdges.find(e => e.target === id);
            return edge ? edge.source : null;
        };

        while (curr) {
            updatedNodes = applyLocalLayout(curr, updatedNodes, currentEdges);
            curr = getParent(curr);
        }
        return updatedNodes;
    };


    // --- APLICACIÓN PRINCIPAL ---
    function App() {
      const [nodes, setNodes] = useState([{
        id: 'root-1', type: 'rectangle', text: 'Inicio', x: 350, y: 200, width: NODE_WIDTH, height: NODE_HEIGHT, color: '#ffffff', comment: ''
      }]);
      const [edges, setEdges] = useState([]);
      const [collapsedNodes, setCollapsedNodes] = useState(new Set());
      const [pan, setPan] = useState({ x: 0, y: 0 });
      const [dragInfo, setDragInfo] = useState(null);
      const [mode, setMode] = useState('pan');
      const [selectionBox, setSelectionBox] = useState(null);
      const [selectedNodes, setSelectedNodes] = useState(new Set());
      const [toast, setToast] = useState('');
      const [activeMenu, setActiveMenu] = useState(null);
      
      const [showSaveModal, setShowSaveModal] = useState(false);
      const [fileName, setFileName] = useState('mi_diagrama');
      const [fileHandle, setFileHandle] = useState(null); 
      
      const [showNewModal, setShowNewModal] = useState(false);
      
      const fileInputRef = useRef(null);
      const canvasRef = useRef(null);

      const handleDeleteSelected = useCallback(() => {
        if (selectedNodes.size === 0) return;
        
        const parentsToUpdate = new Set();
        edges.forEach(edge => {
          if (selectedNodes.has(edge.target) && !selectedNodes.has(edge.source)) {
            parentsToUpdate.add(edge.source);
          }
        });
        
        const nodesToDelete = new Set(selectedNodes);
        let addedNew = true;
        
        while (addedNew) {
          addedNew = false;
          edges.forEach(edge => {
            if (nodesToDelete.has(edge.source) && !nodesToDelete.has(edge.target)) {
              nodesToDelete.add(edge.target);
              addedNew = true;
            }
          });
        }

        let newNodes = nodes.filter(n => !nodesToDelete.has(n.id));
        let newEdges = edges.filter(e => !nodesToDelete.has(e.source) && !nodesToDelete.has(e.target));

        parentsToUpdate.forEach(parentId => {
          if (newNodes.some(n => n.id === parentId)) {
            newNodes = updateTreeLayout(parentId, newNodes, newEdges);
          }
        });

        setNodes(newNodes);
        setEdges(newEdges);
        setCollapsedNodes(prev => {
          const newCollapsed = new Set(prev);
          nodesToDelete.forEach(id => newCollapsed.delete(id));
          return newCollapsed;
        });
        setSelectedNodes(new Set());
        setToast('Figuras borradas y huecos cerrados');
        setTimeout(() => setToast(''), 3000);
      }, [selectedNodes, edges, nodes]);

      const handleNewDiagram = useCallback(() => {
        setNodes([{ id: generateId(), type: 'rectangle', text: 'Inicio', x: 350, y: 200, width: NODE_WIDTH, height: NODE_HEIGHT, color: '#ffffff', comment: '' }]);
        setEdges([]);
        setCollapsedNodes(new Set());
        setPan({ x: 0, y: 0 });
        setSelectedNodes(new Set());
        setSelectionBox(null);
        setActiveMenu(null);
        setFileName('mi_diagrama');
        setFileHandle(null); 
        setShowNewModal(false);
        setToast('Nuevo diagrama creado');
        setTimeout(() => setToast(''), 3000);
      }, []);

      const handleAddLooseNode = useCallback(() => {
        const newId = generateId();
        const nx = -pan.x + window.innerWidth / 2 - NODE_WIDTH / 2;
        const ny = -pan.y + window.innerHeight / 2 - NODE_HEIGHT / 2;
        
        setNodes(prev => [...prev, { 
          id: newId, type: 'rectangle', text: '', x: nx, y: ny, width: NODE_WIDTH, height: NODE_HEIGHT, color: '#ffffff', comment: '' 
        }]);
        
        setToast('Figura suelta añadida');
        setTimeout(() => setToast(''), 3000);
      }, [pan]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if ((e.key === 'Delete' || e.key === 'Backspace') && selectedNodes.size > 0) {
            if (document.activeElement.isContentEditable || document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
            handleDeleteSelected();
          }
          if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            handleSaveClick();
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [selectedNodes, handleDeleteSelected]);

      const { visibleNodes, visibleEdges } = useMemo(() => {
        const hiddenNodes = new Set();
        const traverse = (nodeId, isParentHidden, visited = new Set()) => {
          if (visited.has(nodeId)) return;
          visited.add(nodeId);
          if (isParentHidden) hiddenNodes.add(nodeId);
          const childrenEdges = edges.filter(e => e.source === nodeId);
          const hideChildren = isParentHidden || collapsedNodes.has(nodeId);
          childrenEdges.forEach(e => traverse(e.target, hideChildren, new Set(visited)));
        };
        const roots = nodes.filter(n => !edges.some(e => e.target === n.id));
        if (roots.length === 0 && nodes.length > 0) roots.push(nodes[0]); 
        
        roots.forEach(r => traverse(r.id, false));
        const vNodes = nodes.filter(n => !hiddenNodes.has(n.id));
        const vEdges = edges.filter(e => !hiddenNodes.has(e.target) && !hiddenNodes.has(e.source) && !collapsedNodes.has(e.source));
        return { visibleNodes: vNodes, visibleEdges: vEdges };
      }, [nodes, edges, collapsedNodes]);

      const handleResizeStart = useCallback((e, nodeId) => {
        e.target.setPointerCapture(e.pointerId);
        const node = nodes.find(n => n.id === nodeId);
        setDragInfo({ 
            type: 'resize', 
            id: nodeId, 
            startX: e.clientX, 
            startY: e.clientY, 
            startW: node.width || NODE_WIDTH, 
            startH: node.height || NODE_HEIGHT 
        });
      }, [nodes]);

      const handlePointerDownCanvas = (e) => {
        if (e.target.closest('.no-drag')) return; 
        e.target.setPointerCapture(e.pointerId);
        setActiveMenu(null);
        if (mode === 'pan' || mode === 'connect') { 
          setDragInfo({ type: 'canvas', lastX: e.clientX, lastY: e.clientY });
          setSelectedNodes(new Set());
        } else {
          const rect = e.currentTarget.getBoundingClientRect();
          setSelectionBox({ startX: e.clientX - rect.left - pan.x, startY: e.clientY - rect.top - pan.y, endX: e.clientX - rect.left - pan.x, endY: e.clientY - rect.top - pan.y });
          setSelectedNodes(new Set());
        }
      };

      const handlePointerDownNode = (e, nodeId) => {
        if (mode === 'connect') {
          e.stopPropagation();
          e.target.setPointerCapture(e.pointerId);
          if(canvasRef.current) {
            const rect = canvasRef.current.getBoundingClientRect();
            const canvasX = e.clientX - rect.left - pan.x;
            const canvasY = e.clientY - rect.top - pan.y;
            setDragInfo({ type: 'connect', id: nodeId, canvasX, canvasY });
          }
          setActiveMenu(null);
          return;
        }

        let currentSelected = selectedNodes;
        if (!selectedNodes.has(nodeId)) {
          if (e.shiftKey) {
            currentSelected = new Set([...selectedNodes, nodeId]);
            setSelectedNodes(currentSelected);
          } else {
            currentSelected = new Set([nodeId]);
            setSelectedNodes(currentSelected);
          }
        }
        
        if (e.target.closest('.no-drag')) { e.stopPropagation(); return; }
        e.stopPropagation();
        e.target.setPointerCapture(e.pointerId);
        
        const movingIds = new Set(currentSelected);
        const queue = [...currentSelected];
        while(queue.length > 0) {
          const curr = queue.shift();
          edges.forEach(edge => {
            if (edge.source === curr && !movingIds.has(edge.target)) {
              movingIds.add(edge.target);
              queue.push(edge.target);
            }
          });
        }

        setDragInfo({ type: 'node', id: nodeId, movingIds, lastX: e.clientX, lastY: e.clientY });
        setActiveMenu(null);
      };

      const handlePointerMove = useCallback((e) => {
        if (dragInfo && dragInfo.type === 'connect') {
          if(canvasRef.current) {
            const rect = canvasRef.current.getBoundingClientRect();
            const canvasX = e.clientX - rect.left - pan.x;
            const canvasY = e.clientY - rect.top - pan.y;
            setDragInfo(prev => ({ ...prev, canvasX, canvasY }));
          }
          return;
        }

        if (dragInfo && dragInfo.type === 'resize') {
          const dx = e.clientX - dragInfo.startX;
          const dy = e.clientY - dragInfo.startY;
          setNodes(prev => prev.map(n => {
            if (n.id === dragInfo.id) {
              return { ...n, width: Math.max(80, dragInfo.startW + dx), height: Math.max(60, dragInfo.startH + dy) };
            }
            return n;
          }));
          return;
        }

        if (selectionBox) {
          const rect = e.currentTarget.getBoundingClientRect();
          setSelectionBox(prev => ({ ...prev, endX: e.clientX - rect.left - pan.x, endY: e.clientY - rect.top - pan.y }));
          return;
        }
        if (!dragInfo) return;
        const dx = e.clientX - dragInfo.lastX;
        const dy = e.clientY - dragInfo.lastY;

        if (dragInfo.type === 'node') {
          setNodes(prev => prev.map(n => {
            if (dragInfo.movingIds && dragInfo.movingIds.has(n.id)) {
              return { ...n, x: n.x + dx, y: n.y + dy };
            }
            return n;
          }));
        } else if (dragInfo.type === 'canvas') {
          setPan(prev => ({ x: prev.x + dx, y: prev.y + dy }));
        }
        setDragInfo({ ...dragInfo, lastX: e.clientX, lastY: e.clientY });
      }, [dragInfo, selectionBox, selectedNodes, pan]);

      const handlePointerUp = useCallback((e) => {
        if (dragInfo && dragInfo.type === 'resize') {
          e.target.releasePointerCapture(e.pointerId);
          const resizedId = dragInfo.id;
          setDragInfo(null);
          setNodes(prev => updateTreeLayout(resizedId, prev, edges));
          return;
        }

        if (dragInfo && dragInfo.type === 'connect') {
          e.target.releasePointerCapture(e.pointerId);
          if (canvasRef.current) {
            const rect = canvasRef.current.getBoundingClientRect();
            const dropX = e.clientX - rect.left - pan.x;
            const dropY = e.clientY - rect.top - pan.y;

            const targetNode = visibleNodes.find(n => 
                dropX >= n.x && dropX <= n.x + (n.width || NODE_WIDTH) &&
                dropY >= n.y && dropY <= n.y + (n.height || NODE_HEIGHT)
            );

            if (targetNode && targetNode.id !== dragInfo.id) {
              const exists = edges.some(edge => edge.source === dragInfo.id && edge.target === targetNode.id);
              
              const wouldCreateCycle = (startId, endId) => {
                  const visited = new Set();
                  const queue = [endId];
                  while(queue.length > 0) {
                      const current = queue.shift();
                      if (current === startId) return true;
                      if (!visited.has(current)) {
                          visited.add(current);
                          edges.filter(edge => edge.source === current).forEach(edge => queue.push(edge.target));
                      }
                  }
                  return false;
              };

              if (exists) {
                  setToast('Esta conexión ya existe');
              } else if (wouldCreateCycle(dragInfo.id, targetNode.id)) {
                  setToast('Acción bloqueada: No se pueden crear bucles infinitos');
              } else {
                  const sourceNode = nodes.find(n => n.id === dragInfo.id);
                  const dx = targetNode.x - sourceNode.x;
                  const dy = targetNode.y - sourceNode.y;
                  let dir = 'right';
                  if (Math.abs(dx) >= Math.abs(dy)) {
                      dir = dx >= 0 ? 'right' : 'left';
                  } else {
                      dir = dy >= 0 ? 'bottom' : 'top';
                  }
                  
                  const newEdges = [...edges, { source: dragInfo.id, target: targetNode.id, direction: dir }];
                  const newNodes = updateTreeLayout(dragInfo.id, nodes, newEdges);
                  setNodes(newNodes);
                  setEdges(newEdges);
                  setToast('Figuras conectadas con éxito');
              }
              setTimeout(() => setToast(''), 3000);
            }
          }
          
          setDragInfo(null);
          return;
        }

        if (dragInfo) { e.target.releasePointerCapture(e.pointerId); setDragInfo(null); }
        if (selectionBox) {
          const left = Math.min(selectionBox.startX, selectionBox.endX);
          const right = Math.max(selectionBox.startX, selectionBox.endX);
          const top = Math.min(selectionBox.startY, selectionBox.endY);
          const bottom = Math.max(selectionBox.startY, selectionBox.endY);
          const newSelection = new Set();
          visibleNodes.forEach(n => {
            const nw = n.width || NODE_WIDTH;
            const nh = n.height || NODE_HEIGHT;
            if (n.x < right && n.x + nw > left && n.y < bottom && n.y + nh > top) newSelection.add(n.id);
          });
          setSelectedNodes(newSelection);
          setSelectionBox(null);
        }
      }, [dragInfo, selectionBox, visibleNodes, edges, nodes]);

      const handleSaveClick = async () => {
        const data = { nodes, edges, collapsedNodes: Array.from(collapsedNodes), pan };
        const jsonString = JSON.stringify(data, null, 2);
        try {
          if (window.showSaveFilePicker) {
            let handle = fileHandle; 
            if (!handle) {
              handle = await window.showSaveFilePicker({ 
                suggestedName: `${fileName}.json`, 
                types: [{ description: 'Archivo JSON', accept: { 'application/json': ['.json'] } }] 
              });
              setFileHandle(handle); 
              setFileName(handle.name.replace(/\.json$/, ''));
            }
            const writable = await handle.createWritable();
            await writable.write(jsonString);
            await writable.close();
            setToast(`¡Diagrama guardado en ${handle.name}!`);
            setTimeout(() => setToast(''), 3000);
          } else {
            setShowSaveModal(true);
          }
        } catch (error) {
          if (error.name !== 'AbortError') setShowSaveModal(true);
        }
      };

      const executeSave = () => {
        if (!fileName.trim()) return;
        const data = { nodes, edges, collapsedNodes: Array.from(collapsedNodes), pan };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${fileName.trim()}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        setShowSaveModal(false);
        setToast('¡Diagrama descargado correctamente!');
        setTimeout(() => setToast(''), 3000);
      };

      const handleLoadClick = async () => {
        if (window.showOpenFilePicker) {
          try {
            const [handle] = await window.showOpenFilePicker({
              types: [{ description: 'Archivo JSON', accept: { 'application/json': ['.json'] } }]
            });
            const file = await handle.getFile();
            const text = await file.text();
            const parsed = JSON.parse(text);
            
            setNodes(parsed.nodes || []); setEdges(parsed.edges || []); setCollapsedNodes(new Set(parsed.collapsedNodes || []));
            setPan(parsed.pan || {x: 0, y: 0}); setSelectedNodes(new Set()); 
            
            setFileHandle(handle);
            setFileName(handle.name.replace(/\.json$/, ''));
            
            setToast('Trabajo cargado correctamente');
            setTimeout(() => setToast(''), 3000);
          } catch (error) {
            if (error.name !== 'AbortError') setToast('Error al cargar el archivo');
          }
        } else {
          fileInputRef.current?.click();
        }
      };

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsed = JSON.parse(event.target.result);
            setNodes(parsed.nodes || []); setEdges(parsed.edges || []); setCollapsedNodes(new Set(parsed.collapsedNodes || []));
            setPan(parsed.pan || {x: 0, y: 0}); setSelectedNodes(new Set()); 
            setFileName(file.name.replace(/\.json$/, ''));
            setFileHandle(null); 
            setToast('Trabajo cargado correctamente');
          } catch (error) { setToast('Error: El archivo no es válido'); }
          setTimeout(() => setToast(''), 3000);
          e.target.value = '';
        };
        reader.readAsText(file);
      };

      const handleAddNode = (sourceId, direction, shapeType) => {
        const sourceNode = nodes.find(n => n.id === sourceId);
        
        const w = sourceNode.width || NODE_WIDTH;
        const h = sourceNode.height || NODE_HEIGHT;

        let nx = sourceNode.x, ny = sourceNode.y;
        
        const existingEdgesInDir = edges.filter(e => e.source === sourceId && e.direction === direction);
        const existingChildren = nodes.filter(n => existingEdgesInDir.some(e => e.target === n.id));
        
        if (direction === 'right') { 
            nx += w + 80; 
            ny = existingChildren.length > 0 ? Math.max(...existingChildren.map(c => c.y)) + h + 50 : ny;
        }
        if (direction === 'left') { 
            nx -= w + 80; 
            ny = existingChildren.length > 0 ? Math.max(...existingChildren.map(c => c.y)) + h + 50 : ny;
        }
        if (direction === 'bottom') { 
            ny += h + 80; 
            nx = existingChildren.length > 0 ? Math.max(...existingChildren.map(c => c.x)) + w + 50 : nx;
        }
        if (direction === 'top') { 
            ny -= h + 80; 
            nx = existingChildren.length > 0 ? Math.max(...existingChildren.map(c => c.x)) + w + 50 : nx;
        }
        
        const newId = generateId();
        
        let newNodes = [...nodes, { id: newId, type: shapeType, text: '', x: nx, y: ny, width: w, height: h, color: '#ffffff', comment: '' }];
        let newEdges = [...edges, { source: sourceId, target: newId, direction: direction }]; 

        newNodes = updateTreeLayout(sourceId, newNodes, newEdges);

        setNodes(newNodes);
        setEdges(newEdges);
        setActiveMenu(null);
        
        if (collapsedNodes.has(sourceId)) {
          const newCollapsed = new Set(collapsedNodes); newCollapsed.delete(sourceId); setCollapsedNodes(newCollapsed);
        }
      };

      const getOrthogonalPath = (sourceId, targetId) => {
        const source = nodes.find(n => n.id === sourceId); 
        const target = nodes.find(n => n.id === targetId);
        if (!source || !target) return '';
        
        const sw = source.width || NODE_WIDTH;
        const sh = source.height || NODE_HEIGHT;
        const tw = target.width || NODE_WIDTH;
        const th = target.height || NODE_HEIGHT;

        const sx = source.x + sw / 2;
        const sy = source.y + sh / 2;
        const tx = target.x + tw / 2;
        const ty = target.y + th / 2;
        
        if (target.x >= source.x + sw) {
          const startX = source.x + sw;
          const endX = target.x - 6; 
          const midX = startX + (endX - startX) / 2;
          return `M ${startX} ${sy} L ${midX} ${sy} L ${midX} ${ty} L ${endX} ${ty}`;
        } 
        else if (target.x + tw <= source.x) {
          const startX = source.x;
          const endX = target.x + tw + 6;
          const midX = startX + (endX - startX) / 2;
          return `M ${startX} ${sy} L ${midX} ${sy} L ${midX} ${ty} L ${endX} ${ty}`;
        }
        else if (target.y >= source.y + sh) {
          const startY = source.y + sh;
          const endY = target.y - 6;
          const midY = startY + (endY - startY) / 2;
          return `M ${sx} ${startY} L ${sx} ${midY} L ${tx} ${midY} L ${tx} ${endY}`;
        }
        else if (target.y + th <= source.y) {
          const startY = source.y;
          const endY = target.y + th + 6;
          const midY = startY + (endY - startY) / 2;
          return `M ${sx} ${startY} L ${sx} ${midY} L ${tx} ${midY} L ${tx} ${endY}`;
        }
        
        return `M ${sx} ${sy} L ${tx} ${ty}`;
      };

      return (
        <div ref={canvasRef} className={`w-full h-screen relative bg-slate-50 overflow-hidden font-sans select-none ${mode === 'connect' ? 'cursor-crosshair' : ''}`} onPointerDown={handlePointerDownCanvas} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp}>
          
          <div className="no-print absolute top-4 left-1/2 -translate-x-1/2 z-50 bg-white/95 backdrop-blur shadow-[0_8px_30px_rgb(0,0,0,0.08)] rounded-xl border border-slate-200/80 p-1.5 flex gap-1 items-center" onPointerDown={(e) => e.stopPropagation()}>
            <button className={`p-2 rounded-lg transition-all ${mode === 'pan' ? 'bg-blue-50 text-blue-600 font-semibold' : 'text-slate-500 hover:bg-slate-100'}`} onClick={() => setMode('pan')} title="Mover Lienzo (Mano)"><Hand size={20} /></button>
            <button className={`p-2 rounded-lg transition-all ${mode === 'select' ? 'bg-blue-50 text-blue-600 font-semibold' : 'text-slate-500 hover:bg-slate-100'}`} onClick={() => setMode('select')} title="Seleccionar Grupo (Flecha)"><MousePointer2 size={20} /></button>
            <button className={`p-2 rounded-lg transition-all ${mode === 'connect' ? 'bg-blue-50 text-blue-600 font-semibold' : 'text-slate-500 hover:bg-slate-100'}`} onClick={() => setMode('connect')} title="Conectar figuras libremente"><LinkIcon size={20} /></button>
            
            <div className="w-px h-6 bg-slate-200 mx-1"></div>
            <button className="p-2 rounded-lg text-slate-500 hover:bg-slate-100 transition-all" onClick={handleAddLooseNode} title="Añadir figura suelta"><PlusSquare size={20} /></button>
            <div className="w-px h-6 bg-slate-200 mx-1"></div>
            <button className={`p-2 rounded-lg transition-all ${selectedNodes.size > 0 ? 'text-red-500 hover:bg-red-50' : 'text-slate-300 cursor-not-allowed'}`} onClick={handleDeleteSelected} disabled={selectedNodes.size === 0} title="Borrar selección (Supr)"><Trash2 size={20} /></button>
            <div className="w-px h-6 bg-slate-200 mx-1"></div>
            <button className="p-2 rounded-lg text-slate-500 hover:bg-slate-100 transition-all" onClick={() => setShowNewModal(true)} title="Nuevo diagrama"><FilePlus size={20} /></button>
            <button className="p-2 rounded-lg text-slate-500 hover:bg-slate-100 transition-all" onClick={handleSaveClick} title="Guardar (Sobrescribe si ya existe)"><Save size={20} /></button>
            <button className="p-2 rounded-lg text-slate-500 hover:bg-slate-100 transition-all" onClick={handleLoadClick} title="Cargar trabajo"><FolderOpen size={20} /></button>
            <button className="p-2 rounded-lg text-slate-500 hover:bg-slate-100 transition-all" onClick={() => window.print()} title="Imprimir diagrama"><Printer size={20} /></button>
            <input type="file" accept=".json" style={{ display: 'none' }} ref={fileInputRef} onChange={handleFileChange} />
          </div>

          {toast && <div className="no-print absolute bottom-6 left-1/2 -translate-x-1/2 z-50 bg-slate-900/90 backdrop-blur text-white px-5 py-2.5 rounded-full shadow-lg text-sm font-medium transition-all">{toast}</div>}

          <div className="absolute inset-0 z-0 pointer-events-none" style={{ backgroundImage: `radial-gradient(#cbd5e1 1.5px, transparent 1.5px)`, backgroundSize: '24px 24px', backgroundPosition: `${pan.x}px ${pan.y}px` }} />

          <div className="absolute inset-0" style={{ transform: `translate(${pan.x}px, ${pan.y}px)`, transformOrigin: '0 0' }}>
            
            <svg className="absolute inset-0 w-full h-full overflow-visible pointer-events-none z-10">
              <defs>
                <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                  <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#94a3b8" />
                </marker>
              </defs>
              {visibleEdges.map(edge => <path key={`${edge.source}-${edge.target}`} d={getOrthogonalPath(edge.source, edge.target)} fill="none" stroke="#94a3b8" strokeWidth="2.5" strokeLinejoin="round" markerEnd="url(#arrow)" />)}
              
              {dragInfo && dragInfo.type === 'connect' && dragInfo.canvasX !== undefined && (
                <path 
                  d={`M ${(nodes.find(n => n.id === dragInfo.id)?.x || 0) + (nodes.find(n => n.id === dragInfo.id)?.width || NODE_WIDTH) / 2} ${(nodes.find(n => n.id === dragInfo.id)?.y || 0) + (nodes.find(n => n.id === dragInfo.id)?.height || NODE_HEIGHT) / 2} L ${dragInfo.canvasX} ${dragInfo.canvasY}`} 
                  fill="none" 
                  stroke="#3b82f6" 
                  strokeWidth="2.5" 
                  strokeDasharray="5,5" 
                  strokeLinejoin="round" 
                />
              )}
            </svg>

            <div className="absolute inset-0 pointer-events-none z-20">
              {visibleNodes.map(node => (
                <DiagramNode key={node.id} mode={mode} node={node} edges={edges} isCollapsed={collapsedNodes.has(node.id)} isSelected={selectedNodes.has(node.id)} activeMenu={activeMenu?.nodeId === node.id ? activeMenu : null} setActiveMenu={setActiveMenu} onPointerDown={(e) => handlePointerDownNode(e, node.id)} onAdd={handleAddNode} onTextChange={(id, txt) => setNodes(prev => prev.map(n => n.id === id ? { ...n, text: txt } : n))} onColorChange={(id, clr) => { setNodes(prev => prev.map(n => n.id === id ? { ...n, color: clr } : n)); setActiveMenu(null); }} onCommentChange={(id, cmt) => { setNodes(prev => prev.map(n => n.id === id ? { ...n, comment: cmt } : n)); }} onToggleCollapse={() => { const nc = new Set(collapsedNodes); nc.has(node.id) ? nc.delete(node.id) : nc.add(node.id); setCollapsedNodes(nc); }} onResizeStart={handleResizeStart} />
              ))}
            </div>

            {selectionBox && <div className="absolute border-2 border-blue-500 bg-blue-500/10 z-50 pointer-events-none rounded" style={{ left: Math.min(selectionBox.startX, selectionBox.endX), top: Math.min(selectionBox.startY, selectionBox.endY), width: Math.abs(selectionBox.startX - selectionBox.endX), height: Math.abs(selectionBox.startY - selectionBox.endY) }} />}
          </div>

          {nodes.length === 0 && (
            <div className="absolute inset-0 flex items-center justify-center z-30 pointer-events-none">
              <button className="pointer-events-auto flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-full shadow-xl font-medium transition-transform hover:scale-105" onClick={() => { setNodes([{ id: generateId(), type: 'rectangle', text: 'Inicio', x: -pan.x + window.innerWidth / 2 - NODE_WIDTH / 2, y: -pan.y + window.innerHeight / 2 - NODE_HEIGHT / 2, width: NODE_WIDTH, height: NODE_HEIGHT, color: '#ffffff', comment: '' }]); setMode('pan'); }}><Plus size={20} /> Añadir figura inicial</button>
            </div>
          )}

          {showNewModal && (
            <div className="absolute inset-0 z-[100] flex items-center justify-center bg-slate-900/30 backdrop-blur-sm" onPointerDown={(e) => e.stopPropagation()}>
              <div className="bg-white rounded-2xl shadow-2xl p-6 w-80 border border-slate-100 animate-in zoom-in-95 duration-150">
                <h3 className="text-lg font-bold text-slate-800 mb-1">Nuevo diagrama</h3>
                <p className="text-slate-500 mb-5 text-sm leading-relaxed">¿Estás seguro? Se borrará todo el lienzo actual y perderás los cambios no guardados.</p>
                <div className="flex justify-end gap-2"><button className="px-4 py-2 text-slate-500 hover:bg-slate-50 rounded-xl font-medium text-sm transition-colors" onClick={() => setShowNewModal(false)}>Cancelar</button><button className="px-4 py-2 bg-blue-600 text-white hover:bg-blue-700 rounded-xl font-medium text-sm transition-colors shadow-sm" onClick={handleNewDiagram}>Confirmar</button></div>
              </div>
            </div>
          )}

          {showSaveModal && (
            <div className="absolute inset-0 z-[100] flex items-center justify-center bg-slate-900/30 backdrop-blur-sm" onPointerDown={(e) => e.stopPropagation()}>
              <div className="bg-white rounded-2xl shadow-2xl p-6 w-80 border border-slate-100 animate-in zoom-in-95 duration-150">
                <h3 className="text-lg font-bold text-slate-800 mb-3">Guardar diagrama</h3>
                <input type="text" className="w-full border border-slate-200 rounded-xl p-3 mb-5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 text-slate-700 text-sm font-medium transition-all" value={fileName} onChange={(e) => setFileName(e.target.value)} autoFocus onKeyDown={(e) => e.key === 'Enter' && executeSave()} />
                <div className="flex justify-end gap-2"><button className="px-4 py-2 text-slate-500 hover:bg-slate-50 rounded-xl font-medium text-sm transition-colors" onClick={() => setShowSaveModal(false)}>Cancelar</button><button className="px-4 py-2 bg-blue-600 text-white hover:bg-blue-700 rounded-xl font-medium text-sm transition-colors shadow-sm" onClick={executeSave}>Descargar</button></div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function DiagramNode({ mode, node, edges, isCollapsed, isSelected, activeMenu, setActiveMenu, onPointerDown, onAdd, onTextChange, onColorChange, onCommentChange, onToggleCollapse, onResizeStart }) {
      const [isHovered, setIsHovered] = useState(false);
      const hasChildren = edges.some(e => e.source === node.id);
      
      const palette = COLOR_MAP[node.color] || COLOR_MAP['#ffffff'];
      const currentWidth = node.width || NODE_WIDTH;
      const currentHeight = node.height || NODE_HEIGHT;

      const getMenuPos = (dir) => {
        if (dir === 'top') return { bottom: '115%', left: '50%', transform: 'translateX(-50%)' };
        if (dir === 'bottom') return { top: '115%', left: '50%', transform: 'translateX(-50%)' };
        if (dir === 'left') return { right: '115%', top: '50%', transform: 'translateY(-50%)' };
        if (dir === 'right') return { left: '115%', top: '50%', transform: 'translateY(-50%)' };
        return {};
      };

      return (
        <div className={`absolute pointer-events-auto transition-all duration-150 ${isSelected ? 'ring-2 ring-blue-500 ring-offset-2 rounded-xl' : ''} ${mode === 'connect' ? 'cursor-crosshair hover:ring-2 hover:ring-blue-400 hover:ring-offset-1 hover:rounded-xl' : 'cursor-grab active:cursor-grabbing'}`} style={{ width: currentWidth, height: currentHeight, transform: `translate(${node.x}px, ${node.y}px)` }} onPointerDown={onPointerDown} onMouseEnter={() => setIsHovered(true)} onMouseLeave={() => setIsHovered(false)}>
          
          <ShapeSVG type={node.type} palette={palette} width={currentWidth} height={currentHeight} />
          
          <div contentEditable suppressContentEditableWarning className={`no-drag absolute inset-0 m-4 flex items-center justify-center text-center outline-none focus:bg-white/30 rounded-lg transition-all font-semibold text-sm leading-snug ${mode === 'connect' ? 'pointer-events-none' : ''}`} onBlur={(e) => onTextChange(node.id, e.target.innerText)} style={{ wordBreak: 'break-word', color: palette.text }}>{node.text}</div>
          
          {hasChildren && mode !== 'connect' && <button className="no-drag no-print absolute -bottom-3 right-4 w-7 h-7 bg-white border border-slate-200 rounded-full flex items-center justify-center shadow-md text-slate-500 hover:text-slate-800 z-30 transition-transform hover:scale-110 active:scale-95" onPointerDown={(e) => { e.stopPropagation(); onToggleCollapse(); }} title={isCollapsed ? "Expandir" : "Contraer"}>{isCollapsed ? <Plus size={14} /> : <Minus size={14} />}</button>}
          
          {(isHovered || activeMenu?.type === 'comment' || (node.comment && node.comment.trim() !== '')) && mode !== 'connect' && (
            <button 
              className={`no-drag no-print absolute -top-3 -left-3 w-7 h-7 rounded-full flex items-center justify-center shadow-md z-30 transition-transform hover:scale-110 active:scale-95 border ${node.comment && node.comment.trim() !== '' ? 'bg-amber-50 border-amber-300 text-amber-500' : 'bg-white border-slate-200 text-slate-500 hover:text-slate-800'}`} 
              onPointerDown={(e) => { e.stopPropagation(); setActiveMenu(activeMenu?.type === 'comment' && activeMenu.nodeId === node.id ? null : { nodeId: node.id, type: 'comment' }); }} 
              title={node.comment && node.comment.trim() !== '' ? "Ver/Editar comentario" : "Añadir comentario"}
            >
              <MessageSquare size={14} fill={node.comment && node.comment.trim() !== '' ? "currentColor" : "none"} />
              
              {node.comment && node.comment.trim() !== '' && (
                <span className="absolute -top-1 -right-1 flex h-3.5 w-3.5">
                  <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
                  <span className="relative inline-flex rounded-full h-3.5 w-3.5 bg-amber-500 border-2 border-white"></span>
                </span>
              )}
            </button>
          )}

          {activeMenu?.type === 'comment' && (
            <div className="no-drag no-print absolute z-50 bg-white/95 backdrop-blur border border-slate-200 shadow-xl rounded-xl p-3 w-56 animate-in fade-in zoom-in-95 duration-100 flex flex-col gap-2" style={{ bottom: '100%', left: '0', marginBottom: '16px' }} onPointerDown={(e) => e.stopPropagation()}>
              <textarea
                className="w-full h-24 text-sm bg-slate-50 border border-slate-200 rounded-lg p-2.5 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-700 placeholder-slate-400"
                placeholder="Escribe una nota o comentario aquí..."
                value={node.comment || ''}
                onChange={(e) => onCommentChange(node.id, e.target.value)}
                autoFocus
              />
              <button
                className="w-full text-xs font-semibold text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg py-2 transition-colors"
                onPointerDown={(e) => { e.stopPropagation(); setActiveMenu(null); }}
              >
                Cerrar
              </button>
            </div>
          )}
          
          {(isHovered || activeMenu?.type === 'color') && mode !== 'connect' && <button className="no-drag no-print absolute -top-3 -right-3 w-7 h-7 bg-white border border-slate-200 rounded-full flex items-center justify-center shadow-md text-slate-500 hover:text-slate-800 z-30 transition-transform hover:scale-110 active:scale-95" onPointerDown={(e) => { e.stopPropagation(); setActiveMenu({ nodeId: node.id, type: 'color' }); }} title="Colorear"><Palette size={14} /></button>}
          
          {activeMenu?.type === 'color' && (
            <div className="no-drag no-print absolute -top-14 left-1/2 -translate-x-1/2 z-40 bg-white border border-slate-200/80 rounded-xl shadow-xl p-1.5 flex gap-1.5 animate-in fade-in zoom-in-95 duration-100" onPointerDown={(e) => e.stopPropagation()}>
              {COLORS.map(c => <button key={c} className="w-6 h-6 rounded-lg border shadow-sm hover:scale-115 active:scale-90 transition-transform" style={{ backgroundColor: c, borderColor: COLOR_MAP[c].border }} onPointerDown={(e) => { e.stopPropagation(); onColorChange(node.id, c); }} />)}
            </div>
          )}

          {(isHovered || activeMenu?.type === 'add') && mode !== 'connect' && (
            <>
              <ArrowButton direction="top" icon={<ChevronUp size={16} />} onLeftClick={() => onAdd(node.id, 'top', node.type)} onRightClick={() => setActiveMenu({ nodeId: node.id, type: 'add', direction: 'top' })} />
              <ArrowButton direction="right" icon={<ChevronRight size={16} />} onLeftClick={() => onAdd(node.id, 'right', node.type)} onRightClick={() => setActiveMenu({ nodeId: node.id, type: 'add', direction: 'right' })} />
              <ArrowButton direction="bottom" icon={<ChevronDown size={16} />} onLeftClick={() => onAdd(node.id, 'bottom', node.type)} onRightClick={() => setActiveMenu({ nodeId: node.id, type: 'add', direction: 'bottom' })} />
              <ArrowButton direction="left" icon={<ChevronLeft size={16} />} onLeftClick={() => onAdd(node.id, 'left', node.type)} onRightClick={() => setActiveMenu({ nodeId: node.id, type: 'add', direction: 'left' })} />
            </>
          )}

          {activeMenu?.type === 'add' && (
            <div className="no-drag no-print absolute z-50 bg-white/95 backdrop-blur border border-slate-200 shadow-xl rounded-xl p-1.5 flex gap-1.5 animate-in fade-in zoom-in-95 duration-100" style={getMenuPos(activeMenu.direction)} onPointerDown={(e) => e.stopPropagation()}>
              <button className="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" onPointerDown={(e) => { e.stopPropagation(); onAdd(node.id, activeMenu.direction, 'rectangle'); }} title="Añadir Rectángulo"><Square size={20} /></button>
              <button className="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" onPointerDown={(e) => { e.stopPropagation(); onAdd(node.id, activeMenu.direction, 'circle'); }} title="Añadir Círculo"><Circle size={20} /></button>
              <button className="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" onPointerDown={(e) => { e.stopPropagation(); onAdd(node.id, activeMenu.direction, 'pentagon'); }} title="Añadir Pentágono"><Pentagon size={20} /></button>
              <button className="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" onPointerDown={(e) => { e.stopPropagation(); onAdd(node.id, activeMenu.direction, 'rhombus'); }} title="Añadir Rombo"><Diamond size={20} /></button>
            </div>
          )}

          {/* Tirador de Redimensión en la esquina inferior derecha */}
          {(isSelected || isHovered) && mode !== 'connect' && (
            <div 
              className="no-drag no-print absolute right-0 bottom-0 w-4 h-4 bg-blue-500 border-2 border-white rounded-sm cursor-nwse-resize z-40 shadow-md hover:scale-125 transition-transform"
              style={{ transform: 'translate(40%, 40%)' }}
              onPointerDown={(e) => {
                e.stopPropagation();
                onResizeStart(e, node.id);
              }}
              title="Arrastra para redimensionar"
            />
          )}
        </div>
      );
    }

    const ShapeSVG = ({ type, palette, width, height }) => {
      return (
        <svg width={width} height={height} className="absolute inset-0 z-0 pointer-events-none drop-shadow-[0_4px_10px_rgba(0,0,0,0.06)] overflow-visible">
          <defs>
            <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stopColor="#ffffff" stopOpacity="0.25" />
              <stop offset="100%" stopColor="#000000" stopOpacity="0.04" />
            </linearGradient>
          </defs>
          
          {type === 'rectangle' && (
            <g>
              <rect x="2" y="2" width={width - 4} height={height - 4} rx="12" fill={palette.bg} stroke={palette.border} strokeWidth="2.5" />
              <rect x="2" y="2" width={width - 4} height={height - 4} rx="12" fill="url(#sheen)" />
            </g>
          )}
          {type === 'circle' && (
            <g>
              <ellipse cx={width / 2} cy={height / 2} rx={(width - 4) / 2} ry={(height - 4) / 2} fill={palette.bg} stroke={palette.border} strokeWidth="2.5" />
              <ellipse cx={width / 2} cy={height / 2} rx={(width - 4) / 2} ry={(height - 4) / 2} fill="url(#sheen)" />
            </g>
          )}
          {type === 'pentagon' && (
            <g>
              <polygon points={`${width/2},4 ${width-4},${height * 0.38} ${width * 0.8},${height-4} ${width * 0.2},${height-4} 4,${height * 0.38}`} fill={palette.bg} stroke={palette.border} strokeWidth="2.5" strokeLinejoin="round" />
              <polygon points={`${width/2},4 ${width-4},${height * 0.38} ${width * 0.8},${height-4} ${width * 0.2},${height-4} 4,${height * 0.38}`} fill="url(#sheen)" strokeLinejoin="round" />
            </g>
          )}
          {type === 'rhombus' && (
            <g>
              <polygon points={`${width/2},4 ${width-4},${height/2} ${width/2},${height-4} 4,${height/2}`} fill={palette.bg} stroke={palette.border} strokeWidth="2.5" strokeLinejoin="round" />
              <polygon points={`${width/2},4 ${width-4},${height/2} ${width/2},${height-4} 4,${height/2}`} fill="url(#sheen)" strokeLinejoin="round" />
            </g>
          )}
        </svg>
      );
    };

    const ArrowButton = ({ direction, icon, onLeftClick, onRightClick }) => {
      const getStyle = () => {
        if (direction === 'top') return { top: -12, left: '50%', transform: 'translateX(-50%)' };
        if (direction === 'right') return { top: '50%', right: -12, transform: 'translateY(-50%)' };
        if (direction === 'bottom') return { bottom: -12, left: '50%', transform: 'translateX(-50%)' };
        if (direction === 'left') return { top: '50%', left: -12, transform: 'translateY(-50%)' };
        return {};
      };
      return (
        <button 
          className="no-drag no-print absolute z-30 bg-white border border-slate-200 rounded-full p-1 shadow-md text-slate-400 hover:text-blue-600 hover:border-blue-200 hover:bg-blue-50 transition-all hover:scale-115 active:scale-90" 
          style={getStyle()} 
          onPointerDown={(e) => { 
            e.stopPropagation(); 
          }} 
          onClick={(e) => {
            e.stopPropagation();
            e.preventDefault();
            if (e.ctrlKey || e.button !== 0) return; 
            onLeftClick();
          }}
          onContextMenu={(e) => { 
            e.preventDefault(); 
            e.stopPropagation(); 
            onRightClick(); 
          }}
          title="Clic: Crear. Clic derecho: Elegir forma"
        >
          {icon}
        </button>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
